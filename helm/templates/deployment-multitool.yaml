apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-chart.multitoolName" . }}
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: multitool
spec:
  replicas: {{ .Values.multitool.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: multitool
  template:
    metadata:
      labels:
        {{- include "app-chart.labels" . | nindent 8 }}
        app.kubernetes.io/component: multitool
    spec:
      containers:
        - name: multitool
          image: "{{ .Values.multitool.image.repository }}:{{ .Values.multitool.image.tag }}"
          imagePullPolicy: {{ .Values.multitool.image.pullPolicy }}
          env:
            - name: HTTP_PORT
              value: {{ .Values.multitool.env.HTTP_PORT | quote }}
          ports:
            - containerPort: 8080
              name: http